<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Approved MentorUnion product and design prototypes.">
  <meta name="color-scheme" content="light">
  <title>Prototype Hub</title>
  <link rel="icon" href="assets/icons/hub-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/shared/styles.css">
  <script src="assets/shared/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#prototype-directory">Skip to prototype directory</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="./">MentorUnion</a>
      <span class="header-label">Prototype Hub</span>
    </div>
  </header>

  <main class="container">
    <header class="page-header" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">Prototype Hub</h1>
        <p>Approved product and design prototypes.</p>
      </div>
      <p class="directory-summary" id="directory-summary">Loading prototypes&hellip;</p>
    </header>

    <section class="directory" id="prototype-directory" aria-labelledby="directory-title">
      <h2 class="visually-hidden" id="directory-title">Available prototypes</h2>

      <form class="filters" id="filters" role="search" aria-label="Search and filter prototypes">
        <div class="filter-field search-field">
          <label for="prototype-search">Search</label>
          <div class="search-control">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="18" height="18">
              <path d="m21 21-4.4-4.4m2.4-5.1a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.8"/>
            </svg>
            <input id="prototype-search" name="search" type="search" placeholder="Name or description" autocomplete="off">
          </div>
        </div>

        <div class="filter-field" id="project-filter-field" hidden>
          <label for="project-filter">Project</label>
          <select id="project-filter" name="project" disabled>
            <option value="">All projects</option>
          </select>
        </div>

        <div class="filter-field" id="type-filter-field" hidden>
          <label for="type-filter">Type</label>
          <select id="type-filter" name="type" disabled>
            <option value="">All types</option>
          </select>
        </div>

        <button class="reset-button" id="clear-filters" type="reset" disabled hidden>Reset</button>
      </form>

      <div class="result-row">
        <p class="result-count" id="result-count" aria-live="polite">Loading prototypes&hellip;</p>
      </div>

      <div class="prototype-grid" id="prototype-grid" aria-busy="true"></div>

      <div class="empty-state" id="empty-state" hidden>
        <h3 id="empty-title">No approved prototypes</h3>
        <p id="empty-description">Approved prototypes will appear here.</p>
      </div>

      <noscript>
        <div class="empty-state noscript-state">
          <h3>JavaScript is required</h3>
          <p>Enable JavaScript to load the prototype directory.</p>
        </div>
      </noscript>
    </section>
  </main>
</body>
</html>
